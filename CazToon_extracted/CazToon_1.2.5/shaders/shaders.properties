# voxel image = block type per voxel (cleared each frame)
# light A/B    = ping-pong RGB light propagation buffers (persist across frames)
image.lpvVoxelImg = lpvVoxelSampler red_integer r8ui unsigned_byte true false 256 128 256
image.lpvBlockMaskImg = lpvBlockMaskSampler red_integer r32ui unsigned_int false false 256
image.lpvLightA = lpvLightSamplerA rgba rgba16f half_float false false 256 128 256
image.lpvLightB = lpvLightSamplerB rgba rgba16f half_float false false 256 128 256
program.setup.enabled=true
program.world0/setup.enabled=true
program.world1/setup.enabled=true
program.world-1/setup.enabled=true

clouds=off

customTexture.cloudTex=textures/vanilla_clouds.png

uniform.float.framemod8=frameCounter % 8

# JUNGLE=3, MESA=4, SAVANNA=6, ICY=7, BEACH=9, OCEAN=11, DESERT=12, SWAMP=14
uniform.float.biome_jungle=smooth(101, if(biome == BIOME_SWAMP || biome == BIOME_MANGROVE_SWAMP || biome == 7, 0.0, if(biome_category == 3 || biome == BIOME_JUNGLE || biome == BIOME_BAMBOO_JUNGLE || biome == BIOME_SPARSE_JUNGLE, 1.0, 0.0)), 50.0, 50.0)
uniform.float.biome_swamp=smooth(102, if(biome_category == 14 || biome == BIOME_SWAMP || biome == BIOME_MANGROVE_SWAMP || biome == 7, 1.0, 0.0), 50.0, 50.0)
uniform.float.biome_snowy=smooth(103, if(biome_category == 7 || biome_precipitation == 2, 1.0, 0.0), 50.0, 50.0)
uniform.float.biome_arid=smooth(104, if(biome_category == 12 || biome_category == 4, 1.0, 0.0), 50.0, 50.0)
uniform.float.biome_beach=smooth(105, if(biome_category == 9, 1.0, 0.0), 50.0, 50.0)
uniform.float.biome_savanna=smooth(106, if(biome_category == 6 || biome == 6, 1.0, 0.0), 50.0, 50.0)
uniform.float.biome_ocean=smooth(107, if(biome_category == 11, 1.0, 0.0), 50.0, 50.0)
uniform.float.biome_pale_garden=smooth(108, if(biome == BIOME_PALE_GARDEN, 1.0, 0.0), 50.0, 50.0)

